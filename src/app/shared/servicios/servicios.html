<div class="grid grid-cols-1 md:grid-cols-3 gap-6 p-6">
  <div *ngFor="let s of listaServicios" class="border rounded-xl p-4 shadow-sm hover:shadow-md transition">
    <img [src]="s.imagen" class="w-full h-40 object-cover rounded-lg">
    <h3 class="text-xl font-bold mt-4">{{ s.titulo }}</h3>
    <p class="text-gray-600 text-sm">{{ s.categoria }}</p>
    
    <div class="flex justify-between items-center mt-4">
      <div>
        <span class="text-xs text-gray-400 block">Desde</span>
        <span class="text-lg font-semibold text-blue-600">${{ s.precioBase }}</span>
      </div>
      <button (click)="seleccionarServicio(s)" 
              class="bg-black text-white px-4 py-2 rounded-lg hover:bg-gray-800">
        Reservar
      </button>
    </div>
    
    <p *ngIf="s.precioPost === 0" class="text-[10px] mt-2 text-orange-500 italic">
      * Pago adicional según repuestos en sitio.
    </p>
  </div>
</div>
