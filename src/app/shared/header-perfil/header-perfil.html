<header class="bg-[#1e3a5a] text-white p-8 rounded-b-[40px] shadow-2xl mb-6">
  <div class="container mx-auto flex justify-between items-center">
    <div class="flex items-center gap-4">
      <div class="w-16 h-16 bg-white/10 rounded-3xl border border-white/20 flex items-center justify-center text-2xl">
        👤
      </div>
      <div>
        <h1 class="text-2xl font-black italic uppercase tracking-tighter">Hola, {{ user?.nombre }}</h1>
        <div class="flex items-center gap-2">
          <span class="px-2 py-0.5 bg-blue-500 text-[8px] font-black rounded-lg uppercase tracking-widest">
            {{ user?.rol }}
          </span>
          <span class="text-[10px] opacity-60 font-bold">Quito, Ecuador</span>
        </div>
      </div>
    </div>
    
    <button (click)="logout()" class="p-3 bg-white/5 hover:bg-red-500/20 rounded-2xl transition-colors">
      🚪
    </button>
  </div>
</header>
