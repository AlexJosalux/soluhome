<section class="py-16 bg-white border-y border-stone-50 overflow-hidden">
  <div class="max-w-screen-xl mx-auto px-6">
    
    <div class="text-center mb-12">
    <h2 class="text-lg md:text-xl font-black text-stone-500 uppercase tracking-tighter">
        Marcas Destacadas
    </h2>
    </div>

    <div class="max-w-4xl mx-auto relative group">
      
      <div class="absolute inset-y-0 left-0 w-16 bg-gradient-to-r from-white to-transparent z-10 pointer-events-none"></div>
      <div class="absolute inset-y-0 right-0 w-16 bg-gradient-to-l from-white to-transparent z-10 pointer-events-none"></div>

      <div class="flex overflow-hidden py-4">
        <div class="flex items-center gap-16 animate-infinite-scroll-color shrink-0">
          
          @for (m of [...marcas, ...marcas, ...marcas]; track $index) {
            <a [href]="m.link" target="_blank" rel="noopener"
               class="flex-none transition-all duration-500 hover:grayscale-0 grayscale opacity-60 hover:opacity-100 hover:scale-110">
              <img [src]="m.logo" 
                   [alt]="m.nombre" 
                   class="h-10 md:h-12 w-32 object-contain" />
            </a>
          }

        </div>
      </div>
    </div>

  </div>
</section>
