<section class="pt-3 pb-2 md:py-16 bg-[#fcfcfc] font-sans antialiased">
  <div class="max-w-6xl mx-auto px-6">
    
    <div class="mb-6 border-b border-stone-200 pb-2">
      <h2 class="text-2xl md:text-3xl font-light text-[#1e3a5a] uppercase tracking-tight leading-none">
        Protocolo <span class="font-black italic">Técnico</span>
      </h2>
    </div>
    
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-y-4 md:gap-12 mb-8 md:mb-20">
      @for (paso of pasosProtocolo; track paso.id) {
        <div class="group relative pt-4 md:pt-0 border-b border-stone-100 pb-4 md:border-none md:pb-0">
          <span class="absolute top-0 md:-top-4 left-0 text-4xl font-black text-stone-100/60 group-hover:text-orange-50 transition-colors -z-10">0{{paso.id}}</span>
          
          <div class="relative z-10 flex md:block items-start gap-4">
            <div class="text-[#1e3a5a] mb-0 md:mb-2 group-hover:text-[#f39200] transition-colors shrink-0 mt-1">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" [attr.d]="paso.icon" />
              </svg>
            </div>
            <div>
              <h3 class="text-[12px] md:text-[13px] font-black text-[#1e3a5a] uppercase tracking-wider mb-1 leading-tight">
                {{ paso.titulo }}
              </h3>
              <p class="text-stone-500 text-[13px] md:text-[14px] leading-snug font-medium mb-2">
                {{ paso.descripcion }}
              </p>
              <a [routerLink]="paso.link" class="text-[9px] font-black uppercase tracking-widest text-stone-400 hover:text-[#f39200] transition-colors italic">
                Detalles técnicos +
              </a>
            </div>
          </div>
        </div>
      }
    </div>

    <div class="w-full max-w-4xl mx-auto">
      <div class="relative bg-gradient-to-br from-[#1e3a5a] to-[#0d1f33] rounded-2xl shadow-xl overflow-hidden border border-white/10">
        
        <div class="absolute inset-0 opacity-10 pointer-events-none">
          <div class="absolute top-0 right-0 w-32 h-full bg-[#f39200]/20 skew-x-12 translate-x-5"></div>
        </div>
        
        <div class="relative z-10 p-4 md:p-10">
          <div class="flex flex-col md:flex-row items-center justify-between gap-3 md:gap-6">
            
            <div class="text-center md:text-left">
              <h4 class="text-white text-[18px] md:text-2xl font-black italic tracking-tighter mb-1 md:mb-2 leading-tight uppercase">
                ¿Eres nuestro <span class="text-[#f39200] underline decoration-1 underline-offset-4">primer cliente?</span>
              </h4>
              <p class="text-blue-100/70 text-[12px] md:text-sm font-medium leading-relaxed max-w-[280px] md:max-w-md mx-auto md:mx-0">
                Recibe <span class="text-white font-bold border-b border-white/30 uppercase">Gratis</span> tu diagnóstico especializado en <span class="text-white italic font-bold">SoluHome</span>.
              </p>
            </div>

            <div class="w-full md:w-auto">
              <button routerLink="/servicios" 
                class="w-full md:w-auto bg-[#f39200] text-white font-black px-10 py-4 rounded-xl uppercase tracking-widest text-[11px] transition-all shadow-lg active:scale-95 flex items-center justify-center gap-2 border-none">
                Reclamar Visita
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
