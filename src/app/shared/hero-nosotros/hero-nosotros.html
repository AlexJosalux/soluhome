<section class="relative py-24 bg-stone-50 overflow-hidden border-b border-stone-200/60">
  
  <div class="absolute inset-0 z-0">
    <img [src]="fondoImg" class="w-full h-full object-cover opacity-20 grayscale-[20%]" alt="SoluHome Infraestructura">
    <div class="absolute inset-0 bg-[#1e3a5f]/5"></div>
  </div>

  <div class="max-w-screen-xl mx-auto px-10 relative z-10">
    
    <div class="max-w-xl animate-fade-in">
      
     

      <h1 class="text-4xl md:text-5xl font-black text-[#1e3a5f] uppercase tracking-tighter leading-none mb-6">
        Sobre <br>
        <span class="text-amber-500">Nosotros<span class="text-[#1e3a5f]">.</span></span>
      </h1>

      <div class="space-y-4 border-l-2 border-[#1e3a5f]/10 pl-6">
        <p class="text-[#1e3a5f] text-[13px] md:text-sm font-bold uppercase tracking-wide leading-relaxed">
          Transformando espacios a través de soluciones integrales y seguridad técnica.
        </p>
        
        <p class="text-stone-500 text-[12px] font-medium leading-relaxed italic max-w-sm">
          Excelencia operativa para garantizar la funcionalidad y el confort en cada proyecto residencial.
        </p>
      </div>

      <div class="mt-10 flex gap-1.5">
        <div class="w-1.5 h-1.5 bg-[#1e3a5f] rounded-full"></div>
        <div class="w-1.5 h-1.5 bg-amber-500 rounded-full"></div>
        <div class="w-1.5 h-1.5 bg-stone-300 rounded-full"></div>
      </div>

    </div>

  </div>
</section>
