<section class="relative py-16 md:py-20 bg-stone-50 overflow-hidden border-b border-stone-200/60">
  
  <div class="absolute inset-0 z-0">
    <img [src]="fondoImg" class="w-full h-full object-cover opacity-10 grayscale-[40%]" alt="SoluHome Infraestructura">
    <div class="absolute inset-0 bg-[#1e3a5a]/5"></div>
  </div>

  <div class="max-w-screen-xl mx-auto px-6 md:px-12 relative z-10">
    
    <div class="max-w-xl animate-fade-in">
      
      <h1 class="text-4xl md:text-6xl font-black text-[#1e3a5a] uppercase tracking-tighter leading-[0.9] mb-8 italic">
        Sobre <br>
        <span class="text-[#f39200]">Nosotros<span class="text-[#1e3a5a]">.</span></span>
      </h1>

      <div class="space-y-5 border-l-4 border-[#f39200] pl-6 md:pl-8">
        <p class="text-[#1e3a5a] text-[13px] md:text-sm font-black uppercase tracking-widest leading-relaxed">
          Transformando espacios a través de soluciones integrales y seguridad técnica de vanguardia.
        </p>
        
        <p class="text-stone-500 text-[12px] md:text-[13px] font-bold leading-relaxed italic max-w-sm">
          Nuestra excelencia operativa garantiza la funcionalidad, el confort y la valorización de cada proyecto residencial bajo normativas técnicas estrictas.
        </p>
      </div>

      <div class="mt-10 flex gap-2">
        <div class="w-2 h-2 bg-[#1e3a5a] rounded-full"></div>
        <div class="w-2 h-2 bg-[#f39200] rounded-full shadow-[0_0_8px_rgba(243,146,0,0.4)]"></div>
        <div class="w-2 h-2 bg-stone-300 rounded-full"></div>
      </div>

    </div>

  </div>
</section>
