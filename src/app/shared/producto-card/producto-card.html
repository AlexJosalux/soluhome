<div (click)="onCardClick()"
     class="group bg-white border border-slate-100 cursor-pointer hover:shadow-2xl hover:border-slate-200 transition-all duration-500 relative rounded-sm flex flex-col overflow-visible h-full">

  <div class="relative w-full bg-[#fcfcfc] overflow-hidden aspect-square flex-shrink-0">
    <img [src]="producto.imagen" [alt]="producto.nombre"
         class="h-full w-full object-contain p-5 sm:p-6 group-hover:scale-110 transition-transform duration-700"
         loading="lazy" />
  </div>

  <div class="p-3 flex flex-col flex-1 text-center">
    <span class="font-black text-slate-400 uppercase mb-1.5 block text-[9px] tracking-[0.2em]">
      {{ producto.categoria }}
    </span>

    <h3 class="font-bold text-[#1e3a5a] leading-snug uppercase italic tracking-tighter line-clamp-2 mb-2 text-[12px]">
      {{ producto.nombre }}
    </h3>

    <div class="flex-1"></div>

    <div class="flex-shrink-0">
      <span class="font-black text-[#1e3a5a] block tracking-tighter italic text-[20px] mb-2.5">
        ${{ producto.precio }}
      </span>

      <button (click)="onAdd($event)"
              [style.background]="productoAnadidoId === producto.id ? '#f39200' : 'transparent'"
              [style.color]="productoAnadidoId === producto.id ? 'white' : '#1e3a5a'"
              [style.border-color]="productoAnadidoId === producto.id ? '#f39200' : '#1e3a5a'"
              class="w-full flex items-center justify-center gap-1.5 border-2 rounded-full py-2.5 px-2 font-black text-[10px] uppercase tracking-widest cursor-pointer transition-all duration-300">
        
        @if (productoAnadidoId === producto.id) {
          <span class="animate-pulse">PRODUCTO AÑADIDO</span>
        } @else {
          <svg class="w-3 h-3 fill-current" viewBox="0 0 24 24">
            <path d="M11 9h2V6h3V4h-3V1h-2v3H8v2h3v3zm-4 9c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2zm-8.9-5h7.45c.75 0 1.41-.41 1.75-1.03L21.42 4.59c.17-.3.27-.67.27-1.03a1 1 0 0 0-1-1H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.44C4.83 15.33 5.61 17 7 17h12v-2H7l1.1-2z"/>
          </svg>
          Añadir
        }
      </button>
    </div>
  </div>
</div>
