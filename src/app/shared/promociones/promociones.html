<section class="py-1 md:py-4 bg-[#fcfcfc] font-sans antialiased">
  <div class="max-w-screen-xl mx-auto px-4">
    
    <div class="flex flex-col md:flex-row gap-1.5 md:h-[320px] rounded-3xl overflow-hidden shadow-xl border border-stone-100">
      
      @for (item of promociones; track item.id) {
        <div class="flex-1 md:hover:flex-[3.5] relative group overflow-hidden transition-all duration-700 ease-[cubic-bezier(0.25,1,0.5,1)] cursor-pointer h-[200px] md:h-auto">
          
          <div class="absolute inset-0 bg-[#1e3a5a] z-0"></div>
          <div class="absolute top-0 left-0 w-full h-1.5 bg-[#f39200] z-10"></div>

          <div class="relative z-20 h-full p-4 flex flex-col justify-between">
            
            <div class="flex items-start gap-3">
              <div class="flex items-baseline text-[#f39200] shrink-0 drop-shadow-sm">
                <span class="text-4xl font-black leading-none tracking-tighter">{{ item.valor }}</span>
                <div class="flex flex-col ml-0.5">
                  <span class="text-sm font-bold leading-none">%</span>
                  <span class="text-[7px] font-black uppercase tracking-tighter">OFF</span>
                </div>
              </div>
              <h3 class="text-lg font-black text-white uppercase leading-[0.85] tracking-tighter pt-1 md:group-hover:scale-105 origin-left transition-transform">
                {{ item.titulo }}
              </h3>
            </div>

            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[45%] md:w-3/5 transition-all duration-500 md:group-hover:scale-110 pointer-events-none">
              <img [src]="item.imagen" [alt]="item.titulo" class="w-full h-auto max-h-[110px] md:max-h-[160px] object-contain drop-shadow-[0_15px_15px_rgba(0,0,0,0.4)]" />
            </div>

            <div class="flex justify-between items-end mt-auto">
              <div class="inline-flex items-center gap-2 border border-white/30 rounded-full px-3 py-1 text-white md:group-hover:bg-[#f39200] md:group-hover:text-[#1e3a5a] md:group-hover:border-[#f39200] transition-all shrink-0">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
                <span class="text-[8px] font-black uppercase tracking-widest">Detalles</span>
              </div>

              <div class="hidden md:group-hover:block max-w-[160px] text-right pl-4 animate-fade-in">
                <p class="text-[#f39200] text-[9px] font-black leading-tight tracking-tight uppercase italic drop-shadow-sm">
                  {{ item.descripcion }}
                </p>
              </div>
            </div>

          </div>

          <div class="absolute inset-0 bg-[#1e3a5a]/20 md:group-hover:bg-transparent transition-colors z-10"></div>
        </div>
      }

    </div>
  </div>
</section>
