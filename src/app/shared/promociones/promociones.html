<section class="py-4 md:py-8 bg-[#fcfcfc] font-sans antialiased">
  <div class="max-w-screen-xl mx-auto px-4">
    
    <div class="flex flex-col md:flex-row gap-4 md:gap-1.5 md:h-[320px] rounded-3xl overflow-hidden shadow-xl border border-stone-100">
      
      @for (item of promociones; track item.id) {
        <div class="flex-1 md:hover:flex-[3.5] relative group overflow-hidden transition-all duration-700 ease-[cubic-bezier(0.25,1,0.5,1)] cursor-pointer min-h-[180px] md:h-auto rounded-2xl md:rounded-none">
          
          <div class="absolute inset-0 bg-[#1e3a5a] z-0"></div>
          <div class="absolute top-0 left-0 w-full h-1.5 bg-[#f39200] z-10"></div>

          <div class="relative z-20 h-full p-5 flex flex-col justify-between">
            
            <div class="flex items-start gap-4">
              <div class="flex items-baseline text-[#f39200] shrink-0 drop-shadow-md">
                <span class="text-4xl md:text-5xl font-black leading-none tracking-tighter">{{ item.valor }}</span>
                <div class="flex flex-col ml-1">
                  <span class="text-sm font-bold leading-none">%</span>
                  <span class="text-[8px] font-black uppercase tracking-tighter">OFF</span>
                </div>
              </div>
              <h3 class="text-lg md:text-xl font-black text-white uppercase leading-tight tracking-tighter pt-1">
                {{ item.titulo }}
              </h3>
            </div>

            <div class="relative md:absolute md:top-1/2 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 w-full flex justify-center py-4 md:py-0 pointer-events-none transition-all duration-500 md:group-hover:scale-110">
              <img [src]="item.imagen" 
                   [alt]="item.titulo" 
                   class="w-auto h-28 md:h-40 lg:h-48 object-contain drop-shadow-[0_15px_15px_rgba(0,0,0,0.5)]" />
            </div>

            <div class="flex justify-between items-center mt-2 md:mt-auto">
              <div class="inline-flex items-center gap-2 border border-white/30 rounded-full px-4 py-1.5 text-white bg-white/5 md:group-hover:bg-[#f39200] md:group-hover:text-[#1e3a5a] md:group-hover:border-[#f39200] transition-all shrink-0">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
                <span class="text-[9px] font-black uppercase tracking-widest">Detalles</span>
              </div>

              <div class="block md:hidden lg:group-hover:block max-w-[140px] text-right pl-2">
                <p class="text-[#f39200] text-[10px] font-bold leading-tight tracking-tight uppercase italic opacity-90">
                  {{ item.descripcion }}
                </p>
              </div>
            </div>

          </div>

          <div class="absolute inset-0 bg-[#1e3a5a]/30 md:group-hover:bg-transparent transition-colors z-10"></div>
        </div>
      }

    </div>
  </div>
</section>
