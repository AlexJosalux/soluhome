<div class="min-h-screen flex items-center justify-center p-2 font-sans antialiased relative overflow-hidden bg-[#1e3a5a]">
  
  <img src="https://files.merca20.com/uploads/2024/07/mantenimiento-hogar-por-estacion.jpg" 
       alt="Fondo Mantenimiento Hogar" 
       class="absolute inset-0 w-full h-full object-cover opacity-20 blur-[1px] z-0">
  
  <div class="absolute inset-0 bg-[#1e3a5a]/80 z-10"></div>

  <div class="w-full max-w-[740px] h-auto md:h-[520px] bg-white rounded-[1.5rem] shadow-2xl flex flex-col md:flex-row overflow-hidden border border-white/20 relative z-20 backdrop-blur-sm">
    
    <div class="w-full md:w-[55%] p-5 md:p-6 flex flex-col bg-white order-2 md:order-1 justify-center">
      <div class="max-w-[340px] mx-auto w-full">
        
        <div class="flex justify-center mt-0 mb-2">
          <img src="/images/logosolu.png" alt="SoluHome Logo" class="w-32 md:w-40 drop-shadow-sm transition-transform hover:scale-105 duration-300">
        </div>

        <div class="mb-3 text-center">
          <h2 class="text-lg md:text-xl font-black text-[#1e3a5a] uppercase italic tracking-tighter leading-none">Crea tu cuenta</h2>
          <p class="text-slate-400 text-[8px] font-bold mt-1 uppercase tracking-[0.2em]">Elige tu perfil</p>
        </div>

        @if (errorMessage()) {
          <div class="mb-2 p-2 bg-red-50 border-l-4 border-red-500 text-red-700 text-[9px] font-bold uppercase">
            {{ errorMessage() }}
          </div>
        }

        <form (ngSubmit)="registrar()" #registroForm="ngForm" class="space-y-2">
          
          <div class="grid grid-cols-2 gap-3 mb-3">
            <button type="button" (click)="setRol('ROLE_CLIENTE')"
              class="flex items-center bg-white border border-[#1e3a5a]/50 rounded-xl overflow-hidden shadow-sm transition-all relative h-11 md:h-12"
              [ngClass]="nuevoUsuario.rol === 'ROLE_CLIENTE' ? 'ring-2 ring-[#f39200] border-transparent shadow-lg shadow-[#f39200]/10' : ''">
              
              <div class="w-8 md:w-10 h-full flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 md:w-5 md:h-5" fill="none" viewBox="0 0 24 24" stroke="#f39200" stroke-width="1.8">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                </svg>
              </div>
              <div class="px-1 flex-1 text-left">
                <p class="text-[6px] text-slate-400 font-bold uppercase leading-none">Soy</p>
                <p class="text-[9px] md:text-[10px] font-black text-[#1e3a5a] uppercase tracking-tighter truncate">Cliente</p>
              </div>
            </button>

            <button type="button" (click)="setRol('ROLE_TECNICO')"
              class="flex items-center bg-white border border-[#1e3a5a]/50 rounded-xl overflow-hidden shadow-sm transition-all relative h-11 md:h-12"
              [ngClass]="nuevoUsuario.rol === 'ROLE_TECNICO' ? 'ring-2 ring-[#f39200] border-transparent shadow-lg shadow-[#f39200]/10' : ''">
              
              <div class="w-8 md:w-10 h-full flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 md:w-5 md:h-5" fill="none" viewBox="0 0 24 24" stroke="#f39200" stroke-width="1.8">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 14.15v4.25c0 .621-.504 1.125-1.125 1.125H4.875c-.621 0-1.125-.504-1.125-1.125v-4.25m16.5 0a2.25 2.25 0 00-1.875-2.217V7.875A2.25 2.25 0 0016.125 5.625H7.875a2.25 2.25 0 00-2.25 2.25v4.058A2.25 2.25 0 003.75 14.15m16.5 0h-16.5m10.5-3v-2.25a.75.75 0 00-1.5 0v2.25m-3 0v-2.25a.75.75 0 00-1.5 0v2.25" />
                </svg>
              </div>
              <div class="px-1 flex-1 text-left">
                <p class="text-[6px] text-slate-400 font-bold uppercase leading-none">Soy</p>
                <p class="text-[9px] md:text-[10px] font-black text-[#1e3a5a] uppercase tracking-tighter truncate">Técnico</p>
              </div>
            </button>
          </div>

          <div class="space-y-2">
            <input type="text" name="nombreCompleto" [(ngModel)]="nuevoUsuario.nombreCompleto" placeholder="NOMBRE COMPLETO" required
              class="w-full px-3 py-2 bg-slate-50 border border-slate-100 rounded-lg focus:border-[#f39200] focus:bg-white outline-none text-[10px] font-bold transition-all">
            
            <div class="grid grid-cols-2 gap-2">
              <input type="email" name="email" [(ngModel)]="nuevoUsuario.email" placeholder="CORREO ELECTRÓNICO" required
                class="w-full px-3 py-2 bg-slate-50 border border-slate-100 rounded-lg focus:border-[#f39200] focus:bg-white outline-none text-[10px] font-bold">
              
              <input type="tel" name="telefono" [(ngModel)]="nuevoUsuario.telefono" placeholder="TELÉFONO" required
                class="w-full px-3 py-2 bg-slate-50 border border-slate-100 rounded-lg focus:border-[#f39200] focus:bg-white outline-none text-[10px] font-bold">
            </div>

            <input type="text" name="direccion" [(ngModel)]="nuevoUsuario.direccion" placeholder="DIRECCIÓN DE DOMICILIO" required
              class="w-full px-3 py-2 bg-slate-50 border border-slate-100 rounded-lg focus:border-[#f39200] focus:bg-white outline-none text-[10px] font-bold">
            
            @if (nuevoUsuario.rol === 'ROLE_TECNICO') {
              <input type="text" name="especialidad" [(ngModel)]="nuevoUsuario.especialidad" placeholder="ESPECIALIDAD (Ejem: Plomería)" required
                class="w-full px-3 py-2 bg-slate-50 border border-slate-100 rounded-lg focus:border-[#f39200] focus:bg-white outline-none text-[10px] font-bold animate-fade-in">
            }

            <input type="password" name="password" [(ngModel)]="nuevoUsuario.password" placeholder="CONTRASEÑA" required
              class="w-full px-3 py-2 bg-slate-50 border border-slate-100 rounded-lg focus:border-[#f39200] focus:bg-white outline-none text-[10px] font-bold">
          </div>

          <button type="submit" [disabled]="cargando()"
            class="w-full py-3 bg-[#1e3a5a] hover:bg-[#15293f] text-white text-[10px] font-black rounded-xl transition-all active:scale-95 mt-2 uppercase italic tracking-widest shadow-lg shadow-[#1e3a5a]/30 border-none disabled:opacity-50">
            {{ cargando() ? 'PROCESANDO...' : 'CREAR CUENTA' }}
          </button>
        </form>

        <p class="text-center mt-3 mb-1 text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-relaxed">
          ¿Ya eres parte? <a routerLink="/login" class="text-[#f39200] font-black hover:underline ml-1">Inicia Sesión</a>
        </p>
      </div>
    </div>

    <div class="w-full md:w-[45%] p-5 md:p-6 flex flex-col justify-center border-b md:border-b-0 md:border-l border-slate-100 relative order-1 md:order-2 overflow-hidden bg-[#1e3a5a]">
      
      <img src="https://files.merca20.com/uploads/2024/07/mantenimiento-hogar-por-estacion.jpg" 
           alt="Fondo Mantenimiento" 
           class="absolute inset-0 w-full h-full object-cover opacity-25 z-0">
      
      <div class="absolute inset-0 bg-[#1e3a5a]/75 z-10"></div>

      <div class="relative z-20 flex flex-col items-center text-center w-full"> 
        <h3 class="text-xl md:text-2xl font-black uppercase italic tracking-tighter leading-none text-white">
          Bienvenido a <br> <span class="text-[#f39200]">SoluHome</span>
        </h3>
        
        <p class="text-slate-200 text-[9px] font-bold uppercase mt-2 tracking-widest opacity-80">
          Servicios y productos confiables.
        </p>
        
        <div class="mt-4 md:mt-8 overflow-hidden h-10 relative w-full max-w-[180px]">
          <div class="animate-slide-up space-y-10">
            <div class="h-10 flex items-center gap-2 justify-center">
              <div class="w-1 h-5 bg-[#f39200]"></div>
              <p class="text-[12px] font-extrabold uppercase tracking-widest text-slate-100 italic">Soporte Técnico 24/7</p>
            </div>
            <div class="h-10 flex items-center gap-2 justify-center">
              <div class="w-1 h-5 bg-[#f39200]"></div>
              <p class="text-[11px] font-extrabold uppercase tracking-widest text-slate-100 italic">Técnicos Calificados</p>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
