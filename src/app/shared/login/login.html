<div class="min-h-screen bg-slate-100 flex items-center justify-center p-4 font-sans">
  <div class="w-full max-w-[900px] h-[480px] bg-white rounded-[32px] shadow-2xl flex overflow-hidden border border-gray-200">
    
    <div class="w-1/2 bg-gradient-to-br from-white via-blue-50 to-blue-600 flex flex-col items-center justify-center p-8 text-center border-r border-gray-100">
      <img src="images/logosolu.png" alt="SoluHome" class="w-72 mb-6 drop-shadow-2xl">
      
      <div class="relative z-10">
        <h3 class="text-xl font-black text-blue-900 italic tracking-tight uppercase">Bienvenido</h3>
        <p class="text-blue-800 text-[11px] font-bold leading-relaxed max-w-[220px] mx-auto mt-2">
          La mejor opción para el mantenimiento de tu hogar.
        </p>
        
        <button routerLink="/registro"
          class="mt-8 px-12 py-3 border-2 border-blue-900 text-blue-900 text-[10px] font-black rounded-full hover:bg-blue-900 hover:text-white transition-all active:scale-95 uppercase tracking-[0.2em]">
          Registrarse
        </button>
      </div>
    </div>

    <div class="w-1/2 bg-white flex flex-col items-center justify-center px-16">
      <div class="w-full max-w-[300px]">
        <h2 class="text-3xl font-black text-black mb-1 tracking-tighter italic text-center uppercase">Entrar</h2>
        <p class="text-blue-600 text-[10px] mb-10 text-center uppercase tracking-[0.3em] font-bold">Acceso Seguro</p>
        
        <form (submit)="iniciarSesion()" class="space-y-6">
          <div class="space-y-1">
            <label class="text-[9px] font-black text-black ml-1 uppercase mb-1 block">Correo Electrónico</label>
            <input type="email" name="email" [(ngModel)]="email" required placeholder="tu@correo.com"
              class="w-full px-4 py-3.5 bg-white border-2 border-blue-900/40 rounded-xl focus:border-blue-600 outline-none text-[12px] text-black font-bold placeholder-gray-400 transition-all shadow-sm">
          </div>
          
          <div class="space-y-1">
            <label class="text-[9px] font-black text-black ml-1 uppercase mb-1 block">Contraseña</label>
            <input type="password" name="password" [(ngModel)]="password" required placeholder="••••••••"
              class="w-full px-4 py-3.5 bg-white border-2 border-blue-900/40 rounded-xl focus:border-blue-600 outline-none text-[12px] text-black font-bold placeholder-gray-400 transition-all shadow-sm">
          </div>

          <button type="submit" 
            class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white text-[11px] font-black rounded-2xl shadow-lg shadow-blue-200 transition-all active:scale-95 mt-2 uppercase tracking-widest">
            Iniciar Sesión
          </button>
        </form>
      </div>
    </div>

  </div>
</div>
