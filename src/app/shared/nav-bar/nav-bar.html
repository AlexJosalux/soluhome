<nav class="fixed w-full z-50 top-0 start-0 border-b border-stone-200 bg-white/70 backdrop-blur-md transition-all duration-300">
  <div class="max-w-screen-xl flex flex-nowrap items-center justify-between mx-auto px-4 h-20">
    
    <div class="flex items-center h-full flex-shrink-0">
      <a routerLink="/" class="flex items-center overflow-visible relative">
        <img src="/assets/images/logosolu.png" 
             class="h-16 md:h-28 w-auto object-contain max-w-none drop-shadow-sm" 
             alt="SoluHome Logo" />
      </a>
    </div>

    <div [class.hidden]="!isMenuOpen" 
         [class.flex]="isMenuOpen" 
         class="w-full md:flex md:w-auto md:flex-1 md:justify-center order-3 md:order-2 absolute md:relative top-20 md:top-0 left-0 bg-white/95 md:bg-transparent" id="navbar-default">
      
      <ul class="font-medium flex flex-col p-2 md:p-0 mt-4 border border-stone-100 md:flex-row md:mt-0 md:border-0 md:bg-transparent md:space-x-0">
        <li>
          <a routerLink="/" (click)="isMenuOpen = false" routerLinkActive="bg-stone-100 shadow-inner" [routerLinkActiveOptions]="{exact: true}" class="block py-2 px-1.5 md:px-2 rounded-lg text-stone-600 font-bold hover:bg-stone-50 transition-all text-xs md:text-sm lg:text-base">Home</a>
        </li>
        <li>
          <a routerLink="/productos" (click)="isMenuOpen = false" routerLinkActive="bg-stone-100 shadow-inner" class="block py-2 px-1.5 md:px-2 rounded-lg text-stone-600 font-bold hover:bg-stone-50 transition-all text-xs md:text-sm lg:text-base">Productos</a>
        </li>
        <li>
          <a routerLink="/servicios" (click)="isMenuOpen = false" routerLinkActive="bg-stone-100 shadow-inner" class="block py-2 px-1.5 md:px-2 rounded-lg text-stone-600 font-bold hover:bg-stone-50 transition-all text-xs md:text-sm lg:text-base">Servicios</a>
        </li>
        <li>
          <a routerLink="/consultas" (click)="isMenuOpen = false" routerLinkActive="bg-stone-100 shadow-inner" class="block py-2 px-1.5 md:px-2 rounded-lg text-stone-600 font-bold hover:bg-stone-50 transition-all text-xs md:text-sm lg:text-base">Consultas</a>
        </li>
        <li>
          <a routerLink="/nosotros" (click)="isMenuOpen = false" routerLinkActive="bg-stone-100 shadow-inner" class="block py-2 px-1.5 md:px-2 rounded-lg text-stone-600 font-bold hover:bg-stone-50 transition-all text-xs md:text-sm lg:text-base">Nosotros</a>
        </li>
      </ul>
    </div>

    <div class="flex items-center space-x-1.5 md:space-x-2 flex-shrink-0 order-2 md:order-3">
      
      @if (!authService.usuarioLogueado()) {
        <a routerLink="/login" 
           class="px-3 py-1.5 md:px-5 md:py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-all font-semibold text-xs md:text-sm shadow-sm">
          Login
        </a>
      } 
      @else {
        <a routerLink="/usuario" 
           class="flex items-center space-x-2 px-3 py-1.5 md:px-4 md:py-2 bg-stone-100 text-blue-900 rounded-lg hover:bg-stone-200 transition-all font-bold text-xs md:text-sm border border-stone-200">
          <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          <span class="hidden sm:inline">Mi Perfil</span>
        </a>

        <button (click)="cerrarSesion()" class="text-red-500 hover:text-red-700 transition-colors ml-1">
          <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-red-50 flex items-center justify-center border border-red-100 hover:bg-red-100 transition-all shadow-sm">
            <svg class="w-4 h-4 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
          </div>
        </button>
      }

      <a routerLink="/carrito" class="hidden md:flex text-stone-600 hover:text-blue-600 transition-colors">
        <div class="w-9 h-9 md:w-10 md:h-10 rounded-full bg-stone-50 flex items-center justify-center border border-stone-100 hover:bg-stone-100 transition-all shadow-sm">
          <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
          </svg>
        </div>
      </a>

      <button (click)="isMenuOpen = !isMenuOpen" type="button" class="inline-flex items-center p-1 w-8 h-8 justify-center text-sm text-stone-500 rounded-lg md:hidden hover:bg-stone-100 focus:outline-none">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path [attr.d]="isMenuOpen ? 'M6 18L18 6M6 6l12 12' : 'M4 6h16M4 12h16M4 18h16'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" />
        </svg>
      </button>
    </div>

  </div> 
</nav>
