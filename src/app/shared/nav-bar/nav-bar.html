<nav class="fixed w-full z-50 top-0 start-0 border-b border-slate-200 bg-white/90 backdrop-blur-2xl transition-all duration-300 h-16 flex items-center">
  <div class="max-w-[1440px] w-full flex items-center justify-between mx-auto px-6 md:px-10 h-full">
    
    <div class="flex items-center h-full flex-shrink-0">
      <a routerLink="/" class="flex items-center">
        <img src="/images/logosolu.png" 
             class="h-14 md:h-16 w-auto object-contain drop-shadow-sm transform scale-150 origin-left" 
             alt="SoluHome Logo" />
      </a>
    </div>

    <div [class.hidden]="!isMenuOpen" 
         [class.flex]="isMenuOpen" 
         class="w-full md:flex md:w-auto md:flex-1 md:justify-center order-3 md:order-2 absolute md:relative top-16 md:top-0 left-0 bg-white md:bg-transparent shadow-lg md:shadow-none z-50 md:z-auto" id="navbar-default">
      
      <ul class="flex flex-col md:flex-row p-4 md:p-0 mt-0 md:space-x-4 w-full md:w-auto">
        <li class="w-full md:w-auto">
          <a routerLink="/" (click)="isMenuOpen = false" routerLinkActive="text-[#002f6c] border-b-2 border-[#002f6c]" [routerLinkActiveOptions]="routerLinkActiveOptions" 
             class="block py-3 md:py-1 px-2 md:px-0 text-slate-800 font-semibold uppercase tracking-tight hover:text-[#002f6c] transition-all text-[13px] lg:text-[14px]">
            Home
          </a>
        </li>
        <li class="w-full md:w-auto">
          <a routerLink="/productos" (click)="isMenuOpen = false" routerLinkActive="text-[#002f6c] border-b-2 border-[#002f6c]" 
             class="block py-3 md:py-1 px-2 md:px-0 text-slate-800 font-semibold uppercase tracking-tight hover:text-[#002f6c] transition-all text-[13px] lg:text-[14px]">
            Productos
          </a>
        </li>
        <li class="w-full md:w-auto">
          <a routerLink="/servicios" (click)="isMenuOpen = false" routerLinkActive="text-[#002f6c] border-b-2 border-[#002f6c]" 
             class="block py-3 md:py-1 px-2 md:px-0 text-slate-800 font-semibold uppercase tracking-tight hover:text-[#002f6c] transition-all text-[13px] lg:text-[14px]">
            Servicios
          </a>
        </li>
        <li class="w-full md:w-auto">
          <a routerLink="/consultas" (click)="isMenuOpen = false" routerLinkActive="text-[#002f6c] border-b-2 border-[#002f6c]" 
             class="block py-3 md:py-1 px-2 md:px-0 text-slate-800 font-semibold uppercase tracking-tight hover:text-[#002f6c] transition-all text-[13px] lg:text-[14px]">
            Consultas
          </a>
        </li>
        <li class="w-full md:w-auto">
          <a routerLink="/nosotros" (click)="isMenuOpen = false" routerLinkActive="text-[#002f6c] border-b-2 border-[#002f6c]" 
             class="block py-3 md:py-1 px-2 md:px-0 text-slate-800 font-semibold uppercase tracking-tight hover:text-[#002f6c] transition-all text-[13px] lg:text-[14px]">
            Nosotros
          </a>
        </li>
      </ul>
    </div>

    <div class="flex items-center space-x-2 md:space-x-4 flex-shrink-0 order-2 md:order-3">
      
      @if (!authService.usuarioLogueado()) {
        <a routerLink="/login" 
           class="px-4 py-2 bg-[#002f6c] text-white rounded-sm hover:bg-slate-900 transition-all font-semibold uppercase text-[10px] tracking-widest shadow-sm whitespace-nowrap">
          Iniciar Sesión
        </a>
      } 
      @else {
        <div class="flex items-center space-x-2">
          <a routerLink="/usuario" 
             class="flex items-center space-x-2 px-4 py-2 bg-slate-50 text-[#002f6c] rounded-sm hover:bg-slate-100 transition-all font-semibold uppercase text-[11px] border border-slate-200">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            <span class="hidden sm:inline">Perfil</span>
          </a>

          <button (click)="cerrarSesion()" 
                  title="Cerrar Sesión"
                  class="p-2 text-slate-400 hover:text-red-600 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
          </button>
        </div>
      }

      <a [routerLink]="authService.usuarioLogueado() ? '/carrito' : '/login'" 
         class="relative text-slate-500 hover:text-solu-blue transition-colors p-2 border border-slate-100 rounded-full flex items-center justify-center">

        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>

        @if (carritoService.items().length > 0) {
          <span class="absolute -top-1 -right-1 flex h-4 w-4 items-center justify-center rounded-full bg-solu-orange text-[9px] font-black text-white shadow-sm ring-2 ring-white animate-in zoom-in">
            {{ carritoService.items().length }}
          </span>
        }
      </a>

      <button (click)="toggleMenu()" class="md:hidden p-2 text-slate-600">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path [attr.d]="isMenuOpen ? 'M6 18L18 6M6 6l12 12' : 'M4 6h16M4 12h16M4 18h16'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" /></svg>
      </button>
    </div>

  </div> 
</nav>
