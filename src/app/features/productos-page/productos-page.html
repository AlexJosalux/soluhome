<div class="mb-10 border-l-2 border-amber-500 pl-5">
  <h2 class="text-lg font-bold text-black uppercase tracking-[0.2em] leading-none mb-4">

  </h2>
</div>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
  @for (item of productos$ | async; track item.id) {
    <div class="bg-white border border-stone-200 rounded-lg p-4 flex flex-col transition-all duration-300 hover:shadow-md hover:border-stone-300 group">
      
      <div class="relative w-full aspect-square mb-4 overflow-hidden rounded-md bg-[#fcfcfc] border border-stone-50">
        <img [src]="item.imagen" [alt]="item.nombre" 
             class="h-full w-full object-contain p-4 group-hover:scale-105 transition-transform duration-500" />
      </div>

      <div class="flex flex-col flex-grow">
        <span class="text-[8px] font-black text-stone-300 uppercase tracking-[0.3em] mb-1">
          {{ item.categoria }}
        </span>

        <h3 class="text-[11px] font-bold text-stone-800 leading-tight mb-2 line-clamp-2 h-8 uppercase tracking-tight">
          {{ item.nombre }}
        </h3>

        <p class="text-[9px] text-stone-400 font-mono mb-4 uppercase opacity-70">
          Ref: {{ item.id.substring(0,6) }}
        </p>

        <div class="mt-auto mb-4 border-t border-stone-50 pt-3">
          <span class="text-xl font-black text-[#1e3a5f] tracking-tighter">
            ${{ item.precio }}
          </span>
          <p class="text-[7px] text-stone-400 font-black uppercase mt-0.5 tracking-widest">P.V.P + IVA</p>
        </div>

        <button class="w-full border-2 border-[#1e3a5f] text-[#1e3a5f] rounded-full py-2 flex items-center justify-center gap-2 hover:bg-[#1e3a5f] hover:text-white transition-all group/btn shadow-sm active:scale-95">
          <svg class="w-3.5 h-3.5 fill-current" viewBox="0 0 24 24">
            <path d="M11 9h2V6h3V4h-3V1h-2v3H8v2h3v3zm-4 9c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2zm-8.9-5h7.45c.75 0 1.41-.41 1.75-1.03L21.42 4.59c.17-.3.27-.67.27-1.03a1 1 0 0 0-1-1H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.44C4.83 15.33 5.61 17 7 17h12v-2H7l1.1-2z"/>
          </svg>
          <span class="text-[9px] font-black uppercase tracking-[0.2em]">Agregar</span>
        </button>
      </div>
    </div>
  }
</div>
